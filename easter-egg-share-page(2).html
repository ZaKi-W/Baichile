<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFD400" />
  <title>彩蛋分享页</title>
  <style>
    :root {
      --paper: #f4f1ea;
      --paper-2: #ebe6dc;
      --ink: #171714;
      --muted: #77736b;
      --line: rgba(23, 23, 20, 0.12);
      --card: rgba(255, 255, 255, 0.76);
      --accent: #ff5d3a;
      --wechat-yellow: #FFD400;
      --shadow: 0 24px 70px rgba(39, 34, 25, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 14% 5%, rgba(255,255,255,.95), transparent 28%),
        linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC",
        "Microsoft YaHei", system-ui, sans-serif;
    }

    body {
      min-height: 100svh;
      overflow-x: hidden;
    }

    button { font: inherit; }

    .page {
      width: min(100%, 480px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 14px max(20px, env(safe-area-inset-bottom));
      position: relative;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: .035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/%3E%3C/svg%3E");
      z-index: 20;
    }

    .topbar-wrap {
      margin: calc(-1 * max(14px, env(safe-area-inset-top))) -14px 12px;
      background: var(--wechat-yellow);
      padding-top: max(12px, env(safe-area-inset-top));
      box-shadow: 0 1px 0 rgba(0,0,0,.05);
    }

    .topbar {
      position: relative;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 6px;
    }

    .nav-back {
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      color: #111;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }

    .nav-back:active { opacity: .55; }

    .nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      max-width: calc(100% - 190px);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: #111;
      font-size: 17px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: .01em;
    }

    .mini-program-capsule {
      width: 132px;
      height: 38px;
      border: 1px solid rgba(0,0,0,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.88);
      box-shadow: inset 0 0 0 .5px rgba(255,255,255,.75), 0 1px 2px rgba(0,0,0,.08);
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      align-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .capsule-divider {
      width: 1px;
      height: 22px;
      background: rgba(0,0,0,.13);
    }

    .capsule-action {
      height: 100%;
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      color: #111;
      cursor: pointer;
      padding: 0;
    }

    .capsule-action:active { background: rgba(0,0,0,.06); }

    .capsule-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .capsule-dots i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      display: block;
    }

    .capsule-ring {
      position: relative;
      width: 22px;
      height: 22px;
      border: 3px solid currentColor;
      border-radius: 50%;
    }

    .capsule-ring::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .poster-shell {
      position: relative;
      width: min(76vw, 320px);
      margin: 0 auto;
    }

    .poster-shadow {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -14px;
      height: 44px;
      background: rgba(27, 23, 18, .22);
      filter: blur(26px);
      border-radius: 50%;
      transform: scaleY(.55);
      z-index: 0;
    }

    .poster {
      position: relative;
      z-index: 1;
      aspect-ratio: 9 / 16;
      border-radius: 24px;
      overflow: hidden;
      background: #1a1a1a;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.78);
    }

    .poster img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.22);
      pointer-events: none;
    }

    .image-hint {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 2;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(12, 12, 12, .52);
      color: rgba(255,255,255,.9);
      font-size: 10px;
      letter-spacing: .08em;
      backdrop-filter: blur(10px);
    }

    .content {
      margin-top: 26px;
      padding: 0 4px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .16em;
    }

    .eyebrow::before {
      content: "";
      width: 20px;
      height: 2px;
      border-radius: 2px;
      background: currentColor;
    }

    h1 {
      margin: 0;
      font-size: clamp(27px, 7vw, 36px);
      line-height: 1.06;
      letter-spacing: -.055em;
      font-weight: 900;
    }

    .story {
      margin: 11px 0 0;
      color: #4f4c46;
      font-size: 15px;
      line-height: 1.68;
      letter-spacing: .01em;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }

    .meta-card {
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--card);
      padding: 11px 12px;
      backdrop-filter: blur(14px);
    }

    .meta-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .12em;
      margin-bottom: 7px;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 750;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 17px 0 14px;
    }

    .footer-note {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .avatar {
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(145deg, #ff7658, #ff4e2c);
      font-weight: 900;
    }

    .actions {
      position: sticky;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr 50px;
      gap: 7px;
      margin-top: 18px;
      padding: 7px;
      border: 1px solid rgba(23,23,20,.1);
      border-radius: 19px;
      background: rgba(250,248,243,.78);
      box-shadow: 0 16px 40px rgba(27,23,18,.12);
      backdrop-filter: blur(20px);
    }

    .primary-btn,
    .save-btn,
    .secondary-btn {
      min-height: 47px;
      border: 0;
      border-radius: 13px;
      cursor: pointer;
      transition: transform .18s ease, opacity .18s ease;
    }

    .primary-btn {
      background: var(--ink);
      color: #fff;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .save-btn {
      background: var(--wechat-yellow);
      color: #111;
      font-weight: 800;
      border: 0;
    }

    .secondary-btn {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
    }

    .primary-btn:active,
    .save-btn:active,
    .secondary-btn:active { transform: scale(.97); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 88px;
      z-index: 99;
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(23,23,20,.9);
      color: #fff;
      font-size: 12px;
      transition: .25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (min-width: 700px) {
      body { padding: 32px 0; }
      .page {
        min-height: auto;
        border-radius: 36px;
        box-shadow: 0 28px 80px rgba(42,35,25,.16);
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <main class="page">
    <div class="topbar-wrap">
      <header class="topbar">
        <button class="nav-back" type="button" aria-label="返回" onclick="history.back()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 4.5 7.5 12l7.5 7.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <h1 class="nav-title">朋友请你白吃</h1>

        <div class="mini-program-capsule" aria-label="微信小程序操作区">
          <button class="capsule-action" id="topShare" type="button" aria-label="更多">
            <span class="capsule-dots" aria-hidden="true"><i></i><i></i><i></i></span>
          </button>
          <span class="capsule-divider" aria-hidden="true"></span>
          <button class="capsule-action" type="button" aria-label="关闭小程序">
            <span class="capsule-ring" aria-hidden="true"></span>
          </button>
        </div>
      </header>
    </div>

    <section class="poster-shell" aria-label="彩蛋图片">
      <div class="poster-shadow"></div>
      <div class="poster">
        <!-- 将 src 替换为你的 9:16 彩蛋图片地址即可 -->
        <img
          id="eggImage"
          alt="彩蛋：被小猫偷走了"
          src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='900' height='1600' viewBox='0 0 900 1600'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23221f28'/%3E%3Cstop offset='1' stop-color='%230e0d11'/%3E%3C/linearGradient%3E%3CradialGradient id='glow' cx='.52' cy='.34' r='.55'%3E%3Cstop stop-color='%23ffb779' stop-opacity='.55'/%3E%3Cstop offset='1' stop-color='%23ff6b3d' stop-opacity='0'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='900' height='1600' fill='url(%23bg)'/%3E%3Crect width='900' height='1600' fill='url(%23glow)'/%3E%3Ccircle cx='450' cy='620' r='230' fill='%232a2630' stroke='%23f6d7bb' stroke-opacity='.18' stroke-width='3'/%3E%3Cpath d='M290 530l70-110 55 120M610 530l-70-110-55 120' fill='%2336333e' stroke='%23f6d7bb' stroke-opacity='.23' stroke-width='5'/%3E%3Cellipse cx='450' cy='650' rx='205' ry='180' fill='%2336333e'/%3E%3Cellipse cx='380' cy='625' rx='18' ry='29' fill='%23f3d9bd'/%3E%3Cellipse cx='520' cy='625' rx='18' ry='29' fill='%23f3d9bd'/%3E%3Cpath d='M438 672q12 14 24 0q-12 28-24 0z' fill='%23ff8e74'/%3E%3Cpath d='M320 780q130-95 260 0v260H320z' fill='%23f1eee7'/%3E%3Cpath d='M355 820h190v155H355z' fill='%23ff6b3d'/%3E%3Ctext x='450' y='892' fill='white' text-anchor='middle' font-size='54' font-weight='900' font-family='sans-serif'%3E外卖%3C/text%3E%3Ctext x='450' y='1320' fill='%23fff7ef' text-anchor='middle' font-size='68' font-weight='900' font-family='sans-serif'%3E被小猫偷走了%3C/text%3E%3Ctext x='450' y='1385' fill='%23d8d0c7' text-anchor='middle' font-size='27' font-family='sans-serif'%3E现场没有目击者，只有一串可疑爪印%3C/text%3E%3C/svg%3E"
        />
        <div class="image-hint">9:16 COLLECTIBLE</div>
      </div>
    </section>

    <section class="content">
      <div class="eyebrow">今日发现</div>
      <h1 id="eggTitle">被小猫偷走了</h1>
      <p class="story" id="eggStory">
        外卖刚放到门口，转身的工夫就只剩下一张小票。监控最后拍到的画面里，
        一条尾巴正非常自然地消失在拐角——看起来，它对这顿饭早有计划。
      </p>

      <div class="meta">
        <div class="meta-card">
          <div class="meta-label">发现地点</div>
          <div class="meta-value">门口第三块地砖</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">收集编号</div>
          <div class="meta-value">EGG · 0317</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="footer-note">
        <div class="avatar">Z</div>
        <div>由「这顿白吃」记录<br />每一顿没吃上的饭，都可能藏着一个故事。</div>
      </div>
    </section>

    <div class="actions">
      <button class="primary-btn" id="shareBtn">分享彩蛋</button>
      <button class="save-btn" id="saveBtn">保存到相册</button>
      <button class="secondary-btn" id="copyBtn" aria-label="复制文案">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="8" y="8" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </main>

  <div class="toast" id="toast">已复制分享文案</div>

  <script>
    const title = document.getElementById('eggTitle').textContent.trim();
    const story = document.getElementById('eggStory').textContent.replace(/\s+/g, ' ').trim();
    const shareText = `我在「这顿白吃」发现了彩蛋：${title}\n${story}`;
    const toast = document.getElementById('toast');

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    async function shareEgg() {
      if (navigator.share) {
        try {
          await navigator.share({
            title: `彩蛋｜${title}`,
            text: shareText,
            url: location.href
          });
          return;
        } catch (error) {
          if (error.name === 'AbortError') return;
        }
      }

      try {
        await navigator.clipboard.writeText(`${shareText}\n${location.href}`);
        showToast('分享内容已复制');
      } catch {
        showToast('长按页面即可分享');
      }
    }


    async function saveEggImage() {
      const image = document.getElementById('eggImage');
      const source = image.currentSrc || image.src;

      try {
        const response = await fetch(source);
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = objectUrl;
        link.download = `${title || '彩蛋'}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
        showToast('图片已开始保存');
      } catch (error) {
        image.scrollIntoView({ behavior: 'smooth', block: 'center' });
        showToast('请长按彩蛋图片保存到相册');
      }
    }

    async function copyText() {
      try {
        await navigator.clipboard.writeText(shareText);
        showToast('已复制分享文案');
      } catch {
        showToast('复制失败，请手动选择文字');
      }
    }

    document.getElementById('shareBtn').addEventListener('click', shareEgg);
    document.getElementById('topShare').addEventListener('click', shareEgg);
    document.getElementById('saveBtn').addEventListener('click', saveEggImage);
    document.getElementById('copyBtn').addEventListener('click', copyText);
  </script>
</body>
</html>
