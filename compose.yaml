services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: baichile
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - baichile-postgres:/var/lib/postgresql/data
      - ./infra/docker/init-databases.sql:/docker-entrypoint-initdb.d/01-test-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d baichile"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  baichile-postgres:
