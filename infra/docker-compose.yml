services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: baichile
      POSTGRES_USER: baichile
      POSTGRES_PASSWORD: baichile_dev
    ports:
      - "5432:5432"
    volumes:
      - baichile_postgres:/var/lib/postgresql/data
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baichile -d baichile"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  baichile_postgres:

